<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Contact Us | Shri Shiva Agarbathi Works</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root { --bg-dark: #0f172a; --accent-gold: #f59e0b; --body-bg: #f8fafc; }
    body { font-family: 'Poppins', sans-serif; background-color: var(--body-bg); color: #334155; margin: 0; padding-bottom: 50px; }
    
    .navbar { background: rgba(15, 23, 42, 0.96); padding: 20px 40px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .container { max-width: 800px; margin: 40px auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
    
    h2 { font-size: 32px; margin-bottom: 10px; color: var(--bg-dark); }
    .contact-grid { display: grid; gap: 20px; margin-top: 30px; }
    
    .contact-card { display: flex; align-items: center; gap: 20px; padding: 20px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; text-align: left; transition: 0.3s; }
    .contact-card:hover { border-color: var(--accent-gold); }
    .contact-card i { font-size: 24px; color: var(--accent-gold); width: 40px; text-align: center; }
    .contact-card a { color: #334155; text-decoration: none; font-weight: 500; }
    
    .map-box { margin-top: 30px; border-radius: 15px; overflow: hidden; height: 300px; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .btn-map { display: inline-block; margin-top: 25px; background: var(--bg-dark); color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    .btn-map:hover { background: var(--accent-gold); color: var(--bg-dark); }
  </style>
</head>
<body>

  <div class="navbar">
    <h1><i class="fas fa-industry"></i> Shri Shiva Works</h1>
    <a href="index.html" style="color:white; text-decoration:none;"><i class="fas fa-home"></i></a>
  </div>

  <div class="container">
    <h2>Get In Touch</h2>
    <p>We are here to assist you with any questions regarding our machinery and services.</p>

    <div class="contact-grid">
      <div class="contact-card">
        <i class="fas fa-map-marker-alt"></i>
        <span>Sri Shiva Agarbathi Works, Bangalore, Karnataka, India</span>
      </div>
      <div class="contact-card">
        <i class="fas fa-envelope"></i>
        <a href="mailto:shivamachinerysales@gmail.com">shivamachinerysales@gmail.com</a>
      </div>
      <div class="contact-card">
        <i class="fas fa-phone-alt"></i>
        <a href="tel:+919342426468">+91 93424 26468</a>
      </div>
      <div class="contact-card">
        <i class="fas fa-globe"></i>
        <a href="https://shivaagarbathi.com" target="_blank">shivaagarbathi.com</a>
      </div>
    </div>

    <div class="map-box">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3888.003189914041!2d77.5!3d12.9!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTLCsDU0JzAwLjAiTiA3N8KwMzAnMDAuMCJF!5e0!3m2!1sen!2sin!4v1600000000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
    </div>

    <a href="https://www.google.com/maps" target="_blank" class="btn-map">
      <i class="fas fa-location-arrow"></i> Open in Google Maps
    </a>
  </div>

</body>
</html>
