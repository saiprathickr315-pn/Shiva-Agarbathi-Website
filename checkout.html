<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Checkout</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Inter, Arial, sans-serif; }
body{ background:linear-gradient(135deg,#020617,#0f172a,#111827); color:white; min-height:100vh; padding:30px; }
.container{ max-width:1200px; margin:auto; display:grid; grid-template-columns:1.3fr 0.9fr; gap:28px; }
.card{ background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); backdrop-filter:blur(18px); padding:30px; border-radius:24px; box-shadow:0 8px 30px rgba(0,0,0,0.35); }
h1{ font-size:30px; margin-bottom:25px; }
h2{ font-size:22px; margin-bottom:18px; }
.section-title{ font-size:14px; text-transform:uppercase; letter-spacing:1px; color:#94a3b8; margin-bottom:15px; }
input,select,textarea{ width:100%; padding:15px; border:none; border-radius:14px; background:#1e293b; color:white; margin-bottom:16px; font-size:15px; outline:none; }
input:focus,select:focus,textarea:focus{ outline:2px solid #2563eb; }
textarea{ min-height:90px; resize:none; }
button{ width:100%; padding:16px; border:none; border-radius:16px; background:linear-gradient(135deg,#2563eb,#1d4ed8); color:white; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; }
button:hover{ transform:translateY(-2px); }
.summary-card{ position:sticky; top:20px; height:fit-content; }
table{ width:100%; border-collapse:collapse; margin-top:15px; margin-bottom:20px; }
th,td{ padding:14px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.08); }
th{ color:#94a3b8; font-size:14px; }
.total-box{ margin-top:20px; padding-top:20px; border-top:1px solid rgba(255,255,255,0.08); }
.total-row{ display:flex; justify-content:space-between; margin-bottom:12px; }
.grand-total{ font-size:24px; font-weight:700; color:#4ade80; }
@media(max-width:900px){ .container{ grid-template-columns:1fr; } }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

.success-screen-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #020617, #0f172a, #111827); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
.success-screen-overlay.active { opacity: 1; pointer-events: auto; }
.success-inner-card { max-width: 650px; width: 100%; background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 28px; padding: 40px; text-align: center; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); transform: scale(0.9); transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
.success-screen-overlay.active .success-inner-card { transform: scale(1); }
.success-checkmark-circle { width: 90px; height: 90px; margin: 0 auto 25px auto; border-radius: 50%; background: #16a34a; display: flex; align-items: center; justify-content: center; font-size: 42px; animation: successPulseGlow 2s infinite cubic-bezier(0.66, 0, 0, 1); }
@keyframes successPulseGlow { 70% { box-shadow: 0 0 0 24px rgba(22, 163, 74, 0); } 100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); } }
</style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Checkout</h1>
        <form id="checkoutForm">
            <div class="section-title">Customer Information</div>
            <input type="text" id="name" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>
            <div class="section-title">Delivery Address</div>
            <textarea id="address1" placeholder="Address Line 1" required></textarea>
            <input type="text" id="address2" placeholder="Landmark / Address Line 2">
            <input type="text" id="pinCode" placeholder="PIN Code" required>
            <select id="state" required>
                <option value="">Select State</option>
                <option>Karnataka</option><option>Tamil Nadu</option><option>Kerala</option><option>Andhra Pradesh</option>
                <option>Maharashtra</option><option>Telangana</option><option>Delhi</option><option>Gujarat</option>
            </select>
            <button type="submit">Place Secure Order</button>
        </form>
    </div>

    <div class="card summary-card">
        <h2>Order Summary</h2>
        <table>
            <thead><tr><th>Product</th><th>Amount</th></tr></thead>
            <tbody id="productTable"></tbody>
        </table>
        <div class="total-box">
            <div class="total-row"><span>Total</span><span class="grand-total" id="totalAmount"></span></div>
        </div>
    </div>
</div>

<div class="success-screen-overlay" id="successOverlay">
    <div class="success-inner-card">
        <div class="success-checkmark-circle">✓</div>
        <h1>Order Placed Successfully</h1>
        <p style="color:#cbd5e1;font-size:17px;margin:20px 0;">Thank you for your order. Our team will contact you soon.</p>
        <p>Redirecting in <span id="countdown">15</span> seconds...</p>
    </div>
</div>

<script>
const payload = JSON.parse(localStorage.getItem("checkout_payload")) || { items: [], totalPrice: 0, machines: "" };
const table = document.getElementById("productTable");

if(payload && payload.items){
    payload.items.forEach(item => {
        table.innerHTML += `<tr><td>${item.name} x ${item.quantity}</td><td>₹${(item.price * item.quantity).toLocaleString()}</td></tr>`;
    });
}
document.getElementById("totalAmount").innerText = "₹" + (payload.totalPrice ? payload.totalPrice.toLocaleString() : 0);

function triggerPaymentFeedback() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523.25, 783.99].forEach((freq, i) => {
            setTimeout(() => {
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            }, i * 150);
        });
    } catch (e) {}
}

// PDF Generation Logic
async function generateAndDownloadPDF(name, phone, address, machineString) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const date = new Date().toLocaleDateString();

    // 1. Header
    doc.setFontSize(22);
    doc.text("QUOTATION", 195, 20, { align: "right" });
    doc.setFontSize(14);
    doc.text("Shri Shiva Agarbathi Works", 20, 20);
    doc.setFontSize(10);
    doc.text("Customer Support: +91-9342426468", 20, 26);
    
    // 2. Metadata Box
    doc.setDrawColor(0);
    doc.rect(140, 30, 60, 15);
    doc.setFontSize(9);
    doc.text("DATE", 145, 35);
    doc.text(date, 145, 42);

    // 3. Customer Info
    doc.setFontSize(10);
    doc.text("CUSTOMER INFO", 20, 65);
    doc.line(20, 67, 100, 67);
    doc.text(`Name: ${name}`, 20, 75);
    doc.text(`Phone: ${phone}`, 20, 80);
    doc.text(`Address: ${address}`, 20, 85);

    // 4. Clean Table Header (No Amount)
    doc.setFillColor(200, 200, 200);
    doc.rect(20, 100, 180, 10, 'F');
    doc.text("DESCRIPTION", 25, 107);
    doc.text("QTY", 160, 107);

    // 5. Split Machines and List them
    const machines = machineString.split(',').map(m => m.trim());
    let yPos = 120;
    
    machines.forEach((m) => {
        doc.text(m, 25, yPos);
        doc.text("1", 162, yPos);
        yPos += 10;
    });

    // 6. Footer Disclaimer (Updated Text)
    doc.setFontSize(8);
    doc.setTextColor(50);
    doc.text("NOTE: This is a computer-generated quotation for reference purposes.", 20, 260);
    doc.text("Please keep this document handy as it is the base for further process when our", 20, 265);
    doc.text("customer care representative calls you for verification.", 20, 270);
    
    doc.save(`Quotation_${name.replace(/\s+/g, '_')}.pdf`);
}

document.getElementById("checkoutForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const submitBtn = document.querySelector("button[type='submit']");
    submitBtn.disabled = true;
    submitBtn.innerText = "Processing...";

    const name = document.getElementById("name").value;
    const phoneInput = document.getElementById("phone").value.replace(/\D/g, "");
    const buyerPhone = (phoneInput.length === 10) ? "91" + phoneInput : phoneInput;
    const machine = payload.machines || "Not Specified";
    const price = document.getElementById("totalAmount").innerText;
    const address = document.getElementById("address1").value;
    const pin = document.getElementById("pinCode").value;

    const apiKey = "U1wLZs9Z2hMk";
    const ownerPhone = "919342426468";
    
    const ownerMsg = encodeURIComponent(`📦 *NEW ORDER RECEIVED*\nName: ${name}\nPhone: ${buyerPhone}\nMachine: ${machine}\nTotal: ${price}\nAddress: ${address}, ${pin}`);
    const buyerMsg = encodeURIComponent(`✅ *Order Confirmed!*\nHi ${name}, thank you for choosing us! We have received your order for *${machine}*. Our team will contact you within 2 hours.`);

    const formData = new FormData();
    formData.append("name", name);
    formData.append("phone", buyerPhone);
    formData.append("address1", address);
    formData.append("address2", document.getElementById("address2").value);
    formData.append("pinCode", pin);
    formData.append("state", document.getElementById("state").value);
    formData.append("machineName", machine);
    formData.append("machinePrice", price);

    try {
        await Promise.all([
            fetch("https://script.google.com/macros/s/AKfycbzVDEV4lvmLzBthfeYvd8ek4C0ynbKqZzfMATrLqMxHepgZ8l545ZxTGpSBCuI-_Yy0GA/exec", { method: "POST", mode: "no-cors", body: formData }),
            fetch(`https://api.textmebot.com/send.php?recipient=${ownerPhone}&apikey=${apiKey}&text=${ownerMsg}`, { mode: 'no-cors' }),
            fetch(`https://api.textmebot.com/send.php?recipient=${buyerPhone}&apikey=${apiKey}&text=${buyerMsg}`, { mode: 'no-cors' })
        ]);
        
        // Trigger PDF download after success
        await generateAndDownloadPDF(name, buyerPhone, address, machine, price);
        
    } catch(err) { console.error("Error sending data:", err); }

    triggerPaymentFeedback();
    document.getElementById("successOverlay").classList.add("active");
    localStorage.removeItem("checkout_payload");

    let seconds = 15;
    const timer = setInterval(() => {
        if (--seconds <= 0) { clearInterval(timer); window.location.href = "index.html"; }
        document.getElementById("countdown").innerText = seconds;
    }, 1000);
});
</script>
</body>
</html>
