<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Checkout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#020617,#0f172a,#111827);
    color:white;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:1.3fr 0.9fr;
    gap:28px;
}

.card{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    padding:30px;
    border-radius:24px;
    box-shadow:0 8px 30px rgba(0,0,0,0.35);
}

h1{
    font-size:30px;
    margin-bottom:25px;
}

h2{
    font-size:22px;
    margin-bottom:18px;
}

.section-title{
    font-size:14px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:#94a3b8;
    margin-bottom:15px;
}

input,select,textarea{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    margin-bottom:16px;
    font-size:15px;
    outline:none;
}

input:focus,select:focus,textarea:focus{
    outline:2px solid #2563eb;
}

textarea{
    min-height:90px;
    resize:none;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.summary-card{
    position:sticky;
    top:20px;
    height:fit-content;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
    margin-bottom:20px;
}

th,td{
    padding:14px;
    text-align:left;
    border-bottom:1px solid rgba(255,255,255,0.08);
}

th{
    color:#94a3b8;
    font-size:14px;
}

.total-box{
    margin-top:20px;
    padding-top:20px;
    border-top:1px solid rgba(255,255,255,0.08);
}

.total-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
}

.grand-total{
    font-size:24px;
    font-weight:700;
    color:#4ade80;
}

@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">

    <div class="card">
        <h1>Checkout</h1>

        <form id="checkoutForm">
            <div class="section-title">Customer Information</div>

            <input type="text" id="name" placeholder="Full Name" required>
            <input type="tel" id="phone" placeholder="Phone Number" required>

            <div class="section-title">Delivery Address</div>

            <textarea id="address1" placeholder="Address Line 1" required></textarea>
            <input type="text" id="address2" placeholder="Landmark / Address Line 2">

            <input type="text" id="pinCode" placeholder="PIN Code" required>

            <select id="state" required>
                <option value="">Select State</option>
                <option>Karnataka</option>
                <option>Tamil Nadu</option>
                <option>Kerala</option>
                <option>Andhra Pradesh</option>
                <option>Maharashtra</option>
                <option>Telangana</option>
                <option>Delhi</option>
                <option>Gujarat</option>
            </select>

            <button type="submit">Place Secure Order</button>
        </form>
    </div>

    <div class="card summary-card">
        <h2>Order Summary</h2>

        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="productTable"></tbody>
        </table>

        <div class="total-box">
            <div class="total-row">
                <span>Total</span>
                <span class="grand-total" id="totalAmount"></span>
            </div>
        </div>
    </div>

</div>

<script>
const payload = JSON.parse(localStorage.getItem("checkout_payload"));

const table = document.getElementById("productTable");

if(payload && payload.items){
    payload.items.forEach(item=>{
        table.innerHTML += `
            <tr>
                <td>${item.name} x ${item.quantity}</td>
                <td>₹${(item.price * item.quantity).toLocaleString()}</td>
            </tr>
        `;
    });
}

document.getElementById("totalAmount").innerText = "₹" + payload.totalPrice;


document.getElementById("checkoutForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const submitBtn = document.querySelector("button[type='submit']");
    submitBtn.disabled = true;
    submitBtn.innerHTML = `
        <span style="display:flex;align-items:center;justify-content:center;gap:10px;">
            <span style="width:18px;height:18px;border:3px solid rgba(255,255,255,0.3);border-top:3px solid white;border-radius:50%;animation:spin 0.8s linear infinite;"></span>
            Processing...
        </span>
    `;

    const priceValue = payload.totalPrice || 0;
    const displayPrice = (priceValue > 0) ? "₹" + priceValue : "Price on Request";

    const requestData = {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        address1: document.getElementById("address1").value,
        address2: document.getElementById("address2").value,
        pinCode: document.getElementById("pinCode").value,
        state: document.getElementById("state").value,
        machineName: payload.machines,
        machinePrice: displayPrice
    };

    await fetch(
        "https://script.google.com/macros/s/AKfycbwudcmsJNxUL2oMn781FG8tee9rAAmMuQTmuH9ANmRhkmfE2stZrXv7TESLtARHNASd/exec",
        {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(requestData)
        }
    );

    document.body.innerHTML = `
    <div style="min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#020617,#0f172a,#111827);font-family:Inter,Arial,sans-serif;color:white;padding:20px;">
        <div style="max-width:650px;width:100%;background:rgba(255,255,255,0.06);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:40px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.35);">
            <div style="width:80px;height:80px;margin:auto;border-radius:50%;background:#16a34a;display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:25px;">✓</div>
            <h1 style="font-size:32px;margin-bottom:18px;">Order Placed Successfully</h1>
            <p style="color:#cbd5e1;font-size:17px;line-height:1.7;margin-bottom:25px;">
                Thank you for placing your order with us.<br>
                Our team will contact you very soon.
            </p>
            <div style="background:rgba(255,255,255,0.05);padding:18px;border-radius:18px;margin-bottom:25px;">
                <strong>Expected Response Time:</strong><br>Within 2 hours a representative may call you.
            </div>
            <p style="color:#94a3b8;">Redirecting to homepage in <span id="countdown" style="color:#60a5fa;font-weight:bold;">15</span> seconds...</p>
        </div>
    </div>`;

    localStorage.removeItem("checkout_payload");

    let seconds = 15;
    const timer = setInterval(() => {
        seconds--;
        document.getElementById("countdown").innerText = seconds;
        if(seconds <= 0){
            clearInterval(timer);
            window.location.href = "index.html";
        }
    }, 1000);
});
</script>

</body>
</html>
