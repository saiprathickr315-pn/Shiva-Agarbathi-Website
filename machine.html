  <style>
    :root {
      --bg-dark: #0f172a;        
      --card-bg: #1e293b;        
      --accent-gold: #f59e0b;    
      --text-light: #f8fafc;
      --text-muted: #64748b;
      --body-bg: #f8fafc;
      --primary-color: #0f172a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--body-bg);
      margin: 0; padding: 0;
      color: var(--primary-color);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- NAVIGATION HEAD BAR --- */
    .navbar {
      background: var(--bg-dark);
      padding: 15px 30px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      position: sticky; top: 0; z-index: 1000;
    }

    .navbar-brand h1 {
      color: #ffffff; margin: 0; font-size: 20px; font-weight: 700;
      display: flex; align-items: left; gap: 3px;
    }
    .navbar-brand h1 i { color: var(--accent-gold); }

    .back-btn {
      color: var(--text-light); text-decoration: none; font-size: 13px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border-radius: 20px;
      background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s ease;
    }
    .back-btn:hover { background: var(--accent-gold); color: var(--bg-dark); border-color: var(--accent-gold); }

    /* --- DUAL PANEL SPLIT WORKspace --- */
    .main-workspace {
      max-width: 1300px;
      width: 100%;
      margin: 0 auto;
      padding: 30px 20px 120px 20px;
      display: grid;
      grid-template-columns: 1.3fr 0.7fr;
      gap: 30px;
      flex-grow: 1;
    }

    /* --- TECHNICAL MATRIX PANEL --- */
    .info-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(15, 23, 42, 0.05);
      border: 1px solid #e2e8f0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .info-header {
      border-bottom: 2px solid var(--bg-dark);
      padding-bottom: 15px;
    }
    .info-header h2 {
      margin: 0; font-size: 24px; font-weight: 700; color: var(--bg-dark);
    }

    /* TYPING TEXT TERMINAL BLOCKS */
    .description-box {
      font-size: 15.5px;
      line-height: 1.7;
      color: #1e293b;
      background: #f8fafc;
      padding: 18px;
      border-left: 4px solid var(--accent-gold);
      border-radius: 4px;
      min-height: 60px;
      position: relative;
    }
    
    /* Elegant flashing cursor for ChatGPT typing feedback */
    .typing-cursor::after {
      content: '▋';
      color: var(--accent-gold);
      animation: flash 0.6s infinite;
      font-size: 14px;
      margin-left: 2px;
    }
    @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .table-title {
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 10px 0 0 0;
      color: var(--bg-dark);
      display: flex;
      align-items: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    /* --- MAXIMUM CONTRAST MATRIX SPREADSHEETS --- */
    .specs-table-wrapper {
      width: 100%; 
      border-radius: 12px;
      border: 2.5px solid var(--bg-dark); 
      box-shadow: 0 6px 15px rgba(15, 23, 42, 0.06);
      background: white;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    
    table { width: 100%; border-collapse: collapse; font-size: 15px; text-align: left; }
    
    th { 
      background: var(--bg-dark); 
      color: #ffffff; 
      padding: 16px 20px; 
      font-weight: 700; 
      text-transform: uppercase; 
      letter-spacing: 0.75px; 
      font-size: 13px;
      border-bottom: 3px solid var(--accent-gold);
    }
    
    /* Cascading entry animation for distinct row elements */
    tr.stream-row {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    tr.stream-row.revealed {
      opacity: 1;
      transform: translateY(0);
    }

    td { 
      padding: 16px 20px; 
      border-bottom: 1px solid #cbd5e1; 
      color: #000000; 
      font-weight: 600;
      line-height: 1.5;
    }
    
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) { background: #f1f5f9; }
    
    td .spec-label { color: #334155; font-weight: 700; font-size: 14.5px; }
    td .spec-value { color: #000000; font-weight: 700; font-size: 15.5px; }

    /* --- RIGHT WORKSPACE BLUEPRINT VIEWS --- */
    .image-stream-desk {
      display: flex; flex-direction: column; gap: 16px; width: 100%;
    }
    .image-stream-title {
      font-size: 14px; font-weight: 700; color: var(--bg-dark);
      text-transform: uppercase; letter-spacing: 0.5px; margin: 0;
      display: flex; align-items: center; gap: 8px;
    }
    .image-stream-title i { color: var(--accent-gold); }

    .media-layout-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%;
    }
    
    .interactive-img-card {
      background: white; border-radius: 12px; border: 1px solid #e2e8f0;
      padding: 8px; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.03);
      cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center;
      aspect-ratio: 1 / 1; width: 100%; opacity: 0; transform: scale(0.95);
      transition: transform 0.3s, opacity 0.4s ease;
    }
    .interactive-img-card.visible { opacity: 1; transform: scale(1); }
    .interactive-img-card img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; transition: transform 0.3s; }
    .interactive-img-card:hover img { transform: scale(1.05); }

    /* --- FIXED COMFORT ACCESS CONTROL BAR --- */
    .bottom-action-dock {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #ffffff; border-top: 2px solid var(--bg-dark);
      padding: 16px 30px; display: flex; justify-content: center; z-index: 1100;
      box-shadow: 0 -8px 30px rgba(15, 23, 42, 0.12);
    }
    .dock-container {
      max-width: 1260px; width: 100%; display: flex; gap: 16px; align-items: center;
    }
    .dock-container input {
      flex-grow: 1; padding: 14px 18px; border-radius: 10px;
      border: 1px solid #94a3b8; font-family: inherit; font-size: 14.5px;
      outline: none; background: #f8fafc; color: var(--primary-color); font-weight: 600;
    }
    .dock-container input:focus { border-color: var(--bg-dark); background: white; }
    
    .dock-container button {
      padding: 14px 28px; background: var(--bg-dark); color: var(--accent-gold);
      border: 1px solid var(--accent-gold); font-weight: 700; font-family: inherit;
      border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
      font-size: 13.5px; display: flex; align-items: center; gap: 8px; white-space: nowrap;
    }
    .dock-container button:hover { background: var(--accent-gold); color: var(--bg-dark); }

    /* --- EXPANSION DISPLAY VIEWPORT --- */
    .lightbox { display: none; position: fixed; z-index: 2000; top: 0; left: 0; height: 100%; width: 100%; background: rgba(15, 23, 42, 0.96); backdrop-filter: blur(8px); justify-content: center; align-items: center; }
    .lightbox img { max-width: 90%; max-height: 85vh; border-radius: 8px; object-fit: contain; }
    .close-trigger { position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

    /* --- DUAL DEVICE ADAPTIVE MEDIA BREAKPOINTS --- */
    @media screen and (max-width: 992px) {
      .main-workspace { grid-template-columns: 1fr; gap: 30px; padding: 20px 12px 140px 12px; }
      .bottom-action-dock { padding: 12px 16px; }
      
      /* Collapse layout tables cleanly into massive text blocks on phones */
      table, thead, tbody, th, td, tr { display: block; width: 100%; }
      thead { display: none; }
      
      tr.stream-row {
        border-bottom: 2.5px solid var(--bg-dark);
        padding: 10px 4px;
        background: #ffffff !important;
      }
      tr:last-child { border-bottom: none; }
      
      td { display: flex; flex-direction: column; padding: 6px 12px; border: none; }
      td .spec-label { font-size: 11.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
      td .spec-value { font-size: 16px; color: #000000; }
    }
    /* WhatsApp Style Sticky Bottom Dock Configuration */
    .bottom-action-dock {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: var(--card-bg, #1e293b);
      border-top: 2px solid var(--accent-gold, #f59e0b);
      padding: 12px 20px;
      box-sizing: border-box;
      z-index: 999; /* Ensures it stays on top of all text/images */
      box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.4);
    }

    .dock-container {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
    }

    .dock-container button {
      width: 100%;
      background-color: var(--accent-gold, #f59e0b);
      color: #0f172a;
      border: none;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background-color 0.2s, transform 0.2s;
    }

    .dock-container button:hover {
      background-color: var(--accent-gold-hover, #d97706);
      transform: translateY(-1px);
    }

    /* Padding adjustment so your footer doesn't get covered by the sticky bar */
    body {
      padding-bottom: 80px !important;
    }
  </style>
</head>

    window.addEventListener('DOMContentLoaded', () => {
  const scrollSpeed = 0.3;        // Ultra-slow, steady crawl
  const resumeDelay = 1500;       // Wait 1.5 seconds after you STOP scrolling to resume auto-scroll
  
  let currentPos = window.scrollY || window.pageYOffset;
  let scrollInterval = null;
  let userScrollTimeout = null;

  // The core auto-scroll loop
  const startAutoScroll = () => {
    // Prevent creating duplicate loops
    if (scrollInterval) clearInterval(scrollInterval);
    
    // Sync our tracking variable to exactly where the viewport currently sits
    currentPos = window.scrollY || window.pageYOffset;

    scrollInterval = setInterval(() => {
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;

      // Stop entirely if we hit the very bottom
      if (currentPos >= maxScroll) {
        clearInterval(scrollInterval);
        scrollInterval = null;
        return;
      }

      currentPos += scrollSpeed;
      window.scrollTo(0, currentPos);
    }, 16); // ~60fps smooth rendering
  };

  // Handles manual user intervention
  const handleUserScroll = () => {
    // 1. Instantly pause the auto-scroll loop while user is actively moving
    if (scrollInterval) {
      clearInterval(scrollInterval);
      scrollInterval = null;
    }

    // 2. Clear any pending resume timers
    clearTimeout(userScrollTimeout);

    // 3. Set a timer: if no more scroll events fire for 1.5 seconds, restart the crawl
    userScrollTimeout = setTimeout(() => {
      startAutoScroll();
    }, resumeDelay);
  };

  // Listen for physical mouse wheel, trackpad swipes, or mobile touches
  window.addEventListener('wheel', handleUserScroll, { passive: true });
  window.addEventListener('touchmove', handleUserScroll, { passive: true });
  
  // Handle keyboard scrolling (Arrow keys, Spacebar, etc.)
  window.addEventListener('keydown', (e) => {
    const keys = ['ArrowUp', 'ArrowDown', 'Space', ' ', 'PageUp', 'PageDown'];
    if (keys.includes(e.key)) handleUserScroll();
  });

  // Kick off the initial scroll after an early reading buffer
  setTimeout(startAutoScroll, 2500);
});

    function startStreamingEngine(machineName) {
      const data = machineDetails[machineName];
      if (!data) return;

      document.getElementById("machine-title").innerText = machineName;
      
      // 1. Clear out tables and images ready for dynamic loading
      const table = document.getElementById("specs-table");
      let tableHTML = "<thead><tr><th>Engineering Parameters</th><th>Verified Values</th></tr></thead><tbody>";
      data.specs.forEach(([label, val]) => {
        tableHTML += `<tr class="stream-row">
          <td><span class="spec-label">${label}</span></td>
          <td><span class="spec-value">${val}</span></td>
        </tr>`;
      });
      tableHTML += "</tbody>";
      table.innerHTML = tableHTML;

      const imgContainer = document.getElementById("imageSection");
      imgContainer.innerHTML = "";
      data.images.forEach(src => {
        const div = document.createElement("div");
        div.className = "interactive-img-card";
        div.onclick = () => openLightbox(src);
        div.innerHTML = `<img src="${src}" alt="${machineName}">`;
        imgContainer.appendChild(div);
      });

      // 2. Stream description paragraph letter-by-letter
      const textContainer = document.getElementById("machine-description");
      let fullText = data.description;
      let currentCharIndex = 0;
      textContainer.innerText = "";
      textContainer.classList.add("typing-cursor");

      function typeNextLetter() {
        if (currentCharIndex < fullText.length) {
          textContainer.innerText += fullText.charAt(currentCharIndex);
          currentCharIndex++;
          // Faster typing rate for smooth technical profile output
          setTimeout(typeNextLetter, 12); 
        } else {
          // Finished text streaming -> kill flashing cursor indicator
          textContainer.classList.remove("typing-cursor");
          revealDataSpreadsheet();
        }
      }
      setTimeout(typeNextLetter, 400);
    }

    // 3. Smooth row-by-row matrix cascading arrival effect
    function revealDataSpreadsheet() {
      document.getElementById("table-heading").style.opacity = "1";
      document.getElementById("table-wrapper").style.opacity = "1";

      const lines = document.querySelectorAll("tr.stream-row");
      lines.forEach((line, index) => {
        setTimeout(() => {
          line.classList.add("revealed");
        }, index * 60); // Clean incremental staggered speed reveal
      });

      // Stagger image cards simultaneously alongside content rows
      setTimeout(() => {
        const cards = document.querySelectorAll(".interactive-img-card");
        cards.forEach((card, idx) => {
          setTimeout(() => {
            card.classList.add("visible");
          }, idx * 100);
        });
      }, 200);
    }

   function handleInquiry() {
      // Direct, foolproof routing to your other products file
      window.location.href = "other-products.html";
    }

    function openLightbox(srcString) {
      document.getElementById('modal-image-source').src = srcString;
      document.getElementById('modal-viewport').style.display = 'flex';
    }
    function closeLightbox() {
      document.getElementById('modal-viewport').style.display = 'none';
    }

    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      let selectedMachine = params.get("name") || "Agarbathi Making Machine";
      startStreamingEngine(selectedMachine);
    }
