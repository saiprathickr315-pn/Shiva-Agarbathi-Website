<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cart</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        min-height: 100vh;
        padding: 20px;
        color: white;
    }

    .container {
        max-width: 1100px;
        margin: auto;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-size: 32px;
    }

    .cart-wrapper {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 20px;
    }

    .glass {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    }

    .cart-item {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .cart-item img {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 12px;
    }

    .details {
        flex: 1;
    }

    .details h3 {
        margin-bottom: 8px;
    }

    .price {
        color: #38bdf8;
        font-weight: bold;
        font-size: 18px;
    }

    .qty-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
    }

    .qty-btn {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        background: rgba(255,255,255,0.15);
        color: white;
    }

    .remove-btn {
        background: crimson;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        cursor: pointer;
        color: white;
        margin-top: 10px;
    }

    .summary h2 {
        margin-bottom: 20px;
    }

    .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 18px;
    }

    .total {
        font-size: 24px;
        font-weight: bold;
        color: #4ade80;
    }

    .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 15px;
        font-weight: bold;
    }

    .checkout-btn {
        background: #2563eb;
        color: white;
    }

    .add-more-btn {
        background: #334155;
        color: white;
        text-decoration: none;
        display: block;
        text-align: center;
    }

    @media(max-width: 768px) {
        .cart-wrapper {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h1>🛒 Shopping Cart</h1>
    <br>
    <h2>This is just for Order Conformation All Payment Will Be Done After Discussion </h2>
<h3>Price May Vary

</h3> 
    <div class="cart-wrapper">
        <div class="glass">
            <div id="cartItems"></div>
        </div>

        <div class="glass summary">
            <h2>Order Summary</h2>

            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">₹0</span>
            </div>

            <div class="summary-row">
                <span>GST (18%)</span>
                <span id="tax">₹0</span>
            </div>

            <div class="summary-row total">
                <span>Total</span>
                <span id="total">₹0</span>
            </div>

            <button class="btn checkout-btn" onclick="proceedCheckout()">
                Proceed to Checkout
            </button>

            <a href="products.html" class="btn add-more-btn">
                Add More Products
            </a>
        </div>
    </div>
</div>

<script>
const CART_KEY = "shopping_cart";
const CHECKOUT_KEY = "checkout_payload";

function parsePrice(price) {
    return Number(String(price).replace(/[₹,]/g, "").trim()) || 0;
}

function getCart() {
    return JSON.parse(localStorage.getItem(CART_KEY)) || [];
}

function saveCart(cart) {
    localStorage.setItem(CART_KEY, JSON.stringify(cart));
}

function addProductFromURL() {
    const params = new URLSearchParams(window.location.search);

    const name = params.get("name");
    const price = params.get("price");
    const image = params.get("image");

    if (!name || !price || !image) return;

    let cart = getCart();

    const existing = cart.find(item => item.name === name);

    if (existing) {
        existing.quantity += 1;
    } else {
        cart.push({
            name,
            price: parsePrice(price),
            image,
            quantity: 1
        });
    }

    saveCart(cart);

    window.history.replaceState({}, document.title, window.location.pathname);
}

function updateQuantity(index, change) {
    let cart = getCart();

    cart[index].quantity += change;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    saveCart(cart);
    renderCart();
}

function removeItem(index) {
    let cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    renderCart();
}

function renderCart() {
    const cart = getCart();
    const cartContainer = document.getElementById("cartItems");

    cartContainer.innerHTML = "";

    let subtotal = 0;

    cart.forEach((item, index) => {
        subtotal += item.price * item.quantity;

        cartContainer.innerHTML += `
            <div class="cart-item">
                <img src="${item.image}" alt="${item.name}">
                <div class="details">
                    <h3>${item.name}</h3>
                    <div class="price">₹${item.price.toLocaleString()}</div>

                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                    </div>

                    <button class="remove-btn" onclick="removeItem(${index})">
                        Remove
                    </button>
                </div>
            </div>
        `;
    });

    const tax = subtotal * 0.18;
    const total = subtotal + tax;

    document.getElementById("subtotal").innerText = `₹${subtotal.toLocaleString()}`;
    document.getElementById("tax").innerText = `₹${tax.toFixed(2)}`;
    document.getElementById("total").innerText = `₹${total.toFixed(2)}`;
}

function proceedCheckout() {
    const cart = getCart();

    if (cart.length === 0) {
        alert("Cart is empty");
        return;
    }

    const subtotal = cart.reduce(
        (sum, item) => sum + (item.price * item.quantity), 0
    );

    const tax = subtotal * 0.18;
    const total = subtotal + tax;

    const payload = {
        machines: cart.map(item => item.name).join(", "),
        totalPrice: total.toFixed(2),
        image: cart[0].image,
        items: cart
    };

    localStorage.setItem(CHECKOUT_KEY, JSON.stringify(payload));

    window.location.href = "checkout.html";
}

addProductFromURL();
renderCart();
</script>

</body>
</html>
